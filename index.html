/* ── BACKGROUND ── */
.bg-glow {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 60% 40% at 50% -10%, rgba(79,158,255,.1) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 110%, rgba(45,126,232,.07) 0%, transparent 60%);
}

/* ── LAYOUT ── */
.app {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  height: 100dvh; max-width: 430px; margin: 0 auto;
}

/* ── HEADER ── */
.header {
  padding: 80px 24px 20px;
  display: flex; align-items: flex-end; justify-content: space-between;
  flex-shrink: 0;
}
.header-title {
  font-size: 11px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 4px;
}
.header-name {
  font-size: 28px; font-weight: 800; line-height: 1;
  color: var(--text);
}
.header-sub {
  font-size: 12px; color: var(--sub); margin-top: 4px;
  font-family: 'DM Mono', monospace;
}
.slot-counter {
  display: flex; flex-direction: column; align-items: flex-end; gap: 2px;
}
.slot-dots { display: flex; gap: 6px; }
.slot-dot {
  width: 8px; height: 8px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: transparent;
  transition: all .3s;
}
.slot-dot.filled { background: var(--accent); border-color: var(--accent); }
.slot-label { font-size: 10px; color: var(--sub2); font-family: 'DM Mono', monospace; }

/* ── MAIN SAVE BUTTON ── */
.save-area {
  padding: 0 24px 24px;
  flex-shrink: 0;
}
.save-btn {
  width: 100%; height: 72px; border-radius: 20px; border: none; cursor: pointer;
  background: var(--accent);
  color: #fff; font-family: 'Outfit', sans-serif;
  font-size: 17px; font-weight: 800; letter-spacing: .5px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: transform .15s, opacity .15s, background .2s;
  position: relative; overflow: hidden;
}
.save-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
  pointer-events: none;
}
.save-btn:active { transform: scale(.97); opacity: .9; }
.save-btn.disabled {
  background: var(--card); color: var(--sub);
  border: 1px solid var(--border);
  cursor: not-allowed;
}
.save-btn.disabled::before { display: none; }
.save-btn.loading { opacity: .7; pointer-events: none; }

.save-icon {
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(0,0,0,.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
}

/* ── PINS LIST ── */
.pins-area {
  flex: 1; overflow-y: auto; padding: 0 24px;
  padding-bottom: calc(24px + var(--safe));
  -webkit-overflow-scrolling: touch;
}

.pins-empty {
  display: flex; flex-direction: column; align-items: center;
  padding: 40px 20px; text-align: center; gap: 12px;
}
.pins-empty-icon {
  width: 64px; height: 64px; border-radius: 20px;
  background: var(--card); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin-bottom: 4px;
}
.pins-empty-title { font-size: 16px; font-weight: 700; color: var(--text); }
.pins-empty-sub { font-size: 13px; color: var(--sub); line-height: 1.5; }

.pins-label {
  font-size: 10px; font-weight: 600; letter-spacing: 2px;
  text-transform: uppercase; color: var(--sub2);
  font-family: 'DM Mono', monospace;
  margin-bottom: 12px;
}

.pin-card {
  background: var(--card); border: 1px solid var(--border);
  user-select: none; -webkit-user-select: none;
  border-radius: 18px; padding: 18px; margin-bottom: 12px;
  display: flex; flex-direction: column; gap: 12px;
  transition: border-color .2s;
  animation: slideIn .3s cubic-bezier(.2,0,.2,1);
}
.pin-card:active { border-color: var(--border2); }

@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.pin-top {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
}
.pin-info { flex: 1; min-width: 0; }
.pin-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.pin-number {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.pin-name {
  font-size: 15px; font-weight: 700; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  cursor: pointer; border: none; background: none;
  font-family: 'Outfit', sans-serif; text-align: left; width: 100%;
  padding: 0;
}
.pin-name:focus { outline: none; color: var(--accent); }
.pin-coords {
  font-size: 11px; color: var(--sub); font-family: 'DM Mono', monospace;
  padding-left: 30px;
}
.pin-time {
  font-size: 11px; color: var(--sub2); font-family: 'DM Mono', monospace;
  padding-left: 30px; margin-top: 2px;
}

.pin-actions {
  display: flex; align-items: center; gap: 8px;
  flex-shrink: 0;
}
.pin-action-btn {
  height: 32px; border-radius: 10px; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: background .2s, opacity .15s;
  font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700;
}
.pin-action-btn:active { opacity: .8; }
.pin-rename {
  padding: 0 12px;
  background: rgba(255,255,255,.06); color: var(--text);
  border: 1px solid var(--border2);
}
.pin-delete {
  width: 32px; padding: 0;
  background: rgba(224,85,85,.1); color: var(--red);
}
.pin-delete:active { background: rgba(224,85,85,.2); }

.pin-btns { display: flex; gap: 8px; }
.pin-nav-btn {
  flex: 1; height: 40px; border-radius: 12px; border: none; cursor: pointer;
  font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  transition: opacity .15s;
}
.pin-nav-btn:active { opacity: .75; }
.pin-nav-apple {
  background: rgba(255,255,255,.06); color: var(--text);
  border: 1px solid var(--border2);
}
.pin-nav-google {
  background: rgba(79,158,255,.1); color: var(--accent);
  border: 1px solid rgba(79,158,255,.2);
}
.pin-nav-waze {
  background: rgba(79,168,255,.12); color: #7cc9ff;
  border: 1px solid rgba(124,201,255,.24);
}

/* ── NAME EDIT INPUT ── */
.name-input-wrap {
  flex: 1; min-width: 0;
}
.name-input {
  width: 100%; background: transparent; border: none; outline: none;
  font-size: 15px; font-weight: 700; color: var(--accent);
  font-family: 'Outfit', sans-serif; padding: 0;
}

/* ── STATUS TOAST ── */
.toast {
  position: fixed; bottom: calc(100px + var(--safe)); left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--accent); color: #fff;
  padding: 10px 20px; border-radius: 20px;
  font-size: 13px; font-weight: 700; font-family: 'Outfit', sans-serif;
  opacity: 0; pointer-events: none; z-index: 100;
  transition: all .25s cubic-bezier(.2,0,.2,1);
  white-space: nowrap;
}
.toast.on { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); color: #fff; }

/* ── GPS RING ── */
.gps-ring {
  width: 20px; height: 20px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .7s linear infinite;
  display: none;
}
.save-btn.loading .gps-ring { display: block; }
.save-btn.loading .save-label { display: none; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ── DIVIDER ── */
.divider {
  height: 1px; background: var(--border); margin: 4px 0 16px;
}

.slot-info-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px 20px;
}
.slot-label-left {
  font-size: 12px; color: var(--sub);
  font-family: 'DM Mono', monospace;
}
.slot-right { display: flex; align-items: center; gap: 8px; }
.slot-info-row .slot-dots { display: flex; gap: 6px; }
.slot-info-row .slot-label {
  font-size: 11px; color: var(--sub);
  font-family: 'DM Mono', monospace;
}

/* ── RENAME MODAL ── */
.rename-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  backdrop-filter: blur(4px); z-index: 200;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.rename-overlay.on { opacity: 1; pointer-events: all; }
.rename-modal {
  position: fixed; top: 50%; left: 50%;
  transform: translate(-50%, calc(-50% + 18px)) scale(.96);
  width: calc(100% - 40px); max-width: 360px;
  background: var(--card); border: 1px solid var(--border2); border-radius: 24px;
  padding: 22px 20px 20px;
  z-index: 201; transition: transform .24s cubic-bezier(.2,0,.2,1), opacity .24s;
  display: flex; flex-direction: column; gap: 16px;
  opacity: 0;
  box-shadow: 0 24px 80px rgba(0,0,0,.35);
}
.rename-modal.on {
  transform: translate(-50%, -50%) scale(1);
  opacity: 1;
}
.rename-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border2); margin: 0 auto 2px;
}
.rename-title {
  font-size: 16px; font-weight: 700; color: var(--text); text-align: center;
}
.rename-input {
  width: 100%; height: 48px; background: var(--surface);
  border: 1px solid var(--border2); border-radius: 12px;
  color: var(--text); font-family: 'Outfit', sans-serif;
  font-size: 15px; padding: 0 14px; outline: none;
  transition: border-color .2s;
}
.rename-input:focus { border-color: var(--accent); }
.rename-btns { display: flex; gap: 10px; }
.rename-save {
  flex: 1; height: 46px; border-radius: 12px; border: none;
  background: var(--accent); color: #fff;
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: opacity .15s;
}
.rename-save:active { opacity: .8; }
.rename-cancel {
  flex: 1; height: 46px; border-radius: 12px; border: 1px solid var(--border2);
  background: transparent; color: var(--sub);
  font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .15s;
}
.rename-cancel:active { opacity: .8; }

</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="app">
  <div class="header">
    <div>
      <div class="header-title">Parking Spot Saver</div>
      <div class="header-name">MyPins</div>
    </div>

  </div>

  <div class="save-area">
    <button class="save-btn" id="saveBtn" onclick="savePin()">
      <div class="gps-ring"></div>
      <span class="save-label">Pin My Location</span>
    </button>
  <div class="slot-info-row" id="slotInfoRow">
      <div class="slot-label-left">Up to 3 saved locations</div>
      <div class="slot-right">
        <div class="slot-dots">
          <div class="slot-dot" id="dot0"></div>
          <div class="slot-dot" id="dot1"></div>
          <div class="slot-dot" id="dot2"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="pins-area" id="pinsArea"></div>
</div>

<div class="toast" id="toast"></div>


<!-- Rename modal -->
<div class="rename-overlay" id="renameOverlay" onclick="closeRename()"></div>
<div class="rename-modal" id="renameModal">
  <div class="rename-handle"></div>
  <div class="rename-title">Rename Pin</div>
  <input class="rename-input" id="renameInput" type="text" maxlength="40" placeholder="Pin name...">
  <div class="rename-btns">
    <button class="rename-save" onclick="saveRename()">Save</button>
    <button class="rename-cancel" onclick="closeRename()">Cancel</button>
  </div>
</div>
<script>
// ── STATE ──────────────────────────────────────────────────────────────
var pins = [];

function loadPins() {
  try { pins = JSON.parse(localStorage.getItem('pp_pins') || '[]'); } catch(e) { pins = []; }
}
function savePins() {
  try { localStorage.setItem('pp_pins', JSON.stringify(pins)); } catch(e) {}
}

// ── TOAST ──────────────────────────────────────────────────────────────
var toastTimer;
function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast on' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = 'toast'; }, 2400);
}

// ── SAVE PIN ───────────────────────────────────────────────────────────
function savePin() {
  if (pins.length >= 3) { showToast('Remove a pin first', true); return; }

  var btn = document.getElementById('saveBtn');
  btn.classList.add('loading');

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      btn.classList.remove('loading');
      var lat = pos.coords.latitude;
      var lng = pos.coords.longitude;
      var acc = Math.round(pos.coords.accuracy);
      var pin = {
        id: Date.now(),
        name: 'Parking Spot ' + (pins.length + 1),
        lat: lat,
        lng: lng,
        acc: acc,
        savedAt: Date.now(),
      };
      pins.push(pin);
      savePins();
      render();
      showToast('📍 Pin saved!');
    },
    function(err) {
      btn.classList.remove('loading');
      var msg = err.code === 1 ? 'Location access denied' :
                err.code === 2 ? 'Location unavailable' : 'Location timed out';
      showToast(msg, true);
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
}

// ── DELETE ─────────────────────────────────────────────────────────────
function deletePin(id) {
  pins = pins.filter(function(p) { return p.id !== id; });
  savePins();
  render();
  showToast('Pin removed');
}

function confirmDelete(id) {
  var pin = pins.find(function(p) { return p.id === id; });
  if (!pin) return;
  var ok = window.confirm('Delete "' + pin.name + '"?');
  if (ok) deletePin(id);
}

// ── RENAME ─────────────────────────────────────────────────────────────
var _renamingId = null;
function openRename(id) {
  var pin = pins.find(function(p) { return p.id === id; });
  if (!pin) return;
  _renamingId = id;
  var input = document.getElementById('renameInput');
  input.value = '';
  input.placeholder = pin.name;
  document.getElementById('renameOverlay').classList.add('on');
  document.getElementById('renameModal').classList.add('on');
  input.focus();
}

function closeRename() {
  document.getElementById('renameOverlay').classList.remove('on');
  document.getElementById('renameModal').classList.remove('on');
  _renamingId = null;
}

function saveRename() {
  if (!_renamingId) return;
  var pin = pins.find(function(p) { return p.id === _renamingId; });
  var input = document.getElementById('renameInput');
  var val = input.value.trim() || input.placeholder;
  if (pin && val) { pin.name = val; savePins(); }
  closeRename();
  render();
}



// ── NAVIGATE ───────────────────────────────────────────────────────────
function isAppleDevice() {
  var ua = navigator.userAgent || '';
  var platform = navigator.platform || '';
  var touchMac = platform === 'MacIntel' && navigator.maxTouchPoints > 1;
  return /iPhone|iPad|iPod/.test(ua) || /iPhone|iPad|iPod|Mac/.test(platform) || touchMac;
}

function navigateTo(lat, lng, app) {
  var url;
  if (app === 'apple') {
    url = 'maps://maps.apple.com/?daddr=' + lat + ',' + lng + '&dirflg=d';
  } else if (app === 'waze') {
    var appUrl = 'waze://?ll=' + lat + ',' + lng + '&navigate=yes';
    var webUrl = 'https://waze.com/ul?ll=' + lat + ',' + lng + '&navigate=yes';
    var start = Date.now();
    window.location.href = appUrl;
    setTimeout(function() {
      if (Date.now() - start < 1600) window.open(webUrl, '_blank');
    }, 900);
    return;
  } else {
    url = 'https://www.google.com/maps/dir/?api=1&destination=' + lat + ',' + lng + '&travelmode=driving';
  }
  window.open(url, '_blank');
}

// ── HELPERS ────────────────────────────────────────────────────────────
function fmtCoords(lat, lng) {
  return lat.toFixed(5) + ', ' + lng.toFixed(5);
}

function timeAgo(ts) {
  var diff = Date.now() - ts;
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  var hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

// ── RENDER ─────────────────────────────────────────────────────────────
function render() {
  // Update dots
  for (var i = 0; i < 3; i++) {
    var dot = document.getElementById('dot' + i);
    dot.className = 'slot-dot' + (i < pins.length ? ' filled' : '');
  }

  // Save button state
  var btn = document.getElementById('saveBtn');
  if (pins.length >= 3) {
    btn.className = 'save-btn disabled';
    btn.querySelector('.save-label').textContent = 'All slots full';
  } else {
    btn.className = 'save-btn';
    btn.querySelector('.save-label').textContent = 'Pin My Location';
  }

  // Pins list
  var area = document.getElementById('pinsArea');
  if (!pins.length) {
    area.innerHTML =
      '<div class="pins-empty">' +
        '<div class="pins-empty-icon">📍</div>' +
        '<div class="pins-empty-title">No pins saved</div>' +
        '<div class="pins-empty-sub">Tap "Pin My Location" when you park.<br>Come back later to navigate straight back.</div>' +
      '</div>';
    return;
  }

  var html = '<div class="pins-label">Saved locations</div><div class="divider"></div>';
  var showAppleMaps = isAppleDevice();
  pins.forEach(function(pin, idx) {
    var navButtons =
      '<button class="pin-nav-btn pin-nav-google" onclick="navigateTo(' + pin.lat + ',' + pin.lng + ',\'google\')">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>' +
        'Google Maps' +
      '</button>' +
      '<button class="pin-nav-btn pin-nav-waze" onclick="navigateTo(' + pin.lat + ',' + pin.lng + ',\'waze\')">' +
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18.5 11a6.5 6.5 0 1 0-12.6 2.4c.2.6 0 1.2-.4 1.7L4 17h2.3c.7 0 1.3.4 1.6 1 .5 1.1 1.7 2 3.1 2h3.2"/><path d="M9 18.5h.01"/><path d="M15 18.5h.01"/><path d="M8.5 10.5h.01"/><path d="M14.5 10.5h.01"/></svg>' +
        'Waze' +
      '</button>';

    if (showAppleMaps) {
      navButtons +=
        '<button class="pin-nav-btn pin-nav-apple" onclick="navigateTo(' + pin.lat + ',' + pin.lng + ',\'apple\')">' +
          '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>' +
          'Apple Maps' +
        '</button>';
    }

    html +=
      '<div class="pin-card" id="card-' + pin.id + '">' +
        '<div class="pin-top">' +
          '<div class="pin-info">' +
            '<div class="pin-name-row">' +
              '<div class="pin-number">' + (idx + 1) + '</div>' +
              '<div id="pname-' + pin.id + '" class="pin-name">' +
                escHtml(pin.name) +
              '</div>' +
            '</div>' +
            '<div class="pin-coords">' + fmtCoords(pin.lat, pin.lng) + (pin.acc ? ' ±' + pin.acc + 'm' : '') + '</div>' +
            '<div class="pin-time">' + timeAgo(pin.savedAt) + '</div>' +
          '</div>' +
          '<div class="pin-actions">' +
            '<button class="pin-action-btn pin-rename" onclick="openRename(' + pin.id + ')" title="Rename">' +
              'Rename' +
            '</button>' +
            '<button class="pin-action-btn pin-delete" onclick="confirmDelete(' + pin.id + ')" title="Delete">' +
              '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 4h6"/><path d="M4 7h16"/><path d="M7 7l1 12h8l1-12"/><path d="M10 11v5M14 11v5"/><path d="M8 7l1-2h6l1 2"/></svg>' +
            '</button>' +
          '</div>' +
        '</div>' +
        '<div class="pin-btns">' +
          navButtons +
        '</div>' +
      '</div>';
  });

  area.innerHTML = html;

  // Live-update times
  clearInterval(timeTimer);
  timeTimer = setInterval(function() {
    pins.forEach(function(pin) {
      var el = document.querySelector('#card-' + pin.id + ' .pin-time');
      if (el) el.textContent = timeAgo(pin.savedAt);
    });
  }, 30000);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

var timeTimer;

// ── INIT ───────────────────────────────────────────────────────────────
loadPins();
render();
